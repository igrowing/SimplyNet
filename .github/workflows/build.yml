name: Build & Test

on:
  push:
    branches: [ '**' ]          # every branch, including main
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Unit tests — runs on every branch, every push
  # ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --reporter expanded

  # ─────────────────────────────────────────────────────────────
  # 2. Build APK — runs on every branch after tests pass
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so commit count works

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      # ── Version bump logic ───────────────────────────────────
      # main branch  →  version as-is from pubspec.yaml
      # other branch →  <semver><letter><build_number>
      #                 e.g. 0.1.0a42   (letter = 'a' always for pre-release)
      #                 build_number = total git commit count (monotonically increasing)
      - name: Compute version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUM=$(git rev-list --count HEAD)

          if [ "$BRANCH" = "main" ]; then
            VERSION_NAME="$BASE_VERSION"
            echo "version_name=$VERSION_NAME"  >> $GITHUB_OUTPUT
            echo "build_number=$BUILD_NUM"      >> $GITHUB_OUTPUT
            echo "flutter_version=${VERSION_NAME}+${BUILD_NUM}" >> $GITHUB_OUTPUT
          else
            # Sanitise branch name for use in filenames (replace / and non-alnum with -)
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr -cd '[:alnum:]-_')
            VERSION_NAME="${BASE_VERSION}a${BUILD_NUM}"
            echo "version_name=$VERSION_NAME"  >> $GITHUB_OUTPUT
            echo "build_number=$BUILD_NUM"      >> $GITHUB_OUTPUT
            echo "safe_branch=$SAFE_BRANCH"     >> $GITHUB_OUTPUT
            echo "flutter_version=${VERSION_NAME}+${BUILD_NUM}" >> $GITHUB_OUTPUT
          fi

          echo "Branch   : $BRANCH"
          echo "Base ver : $BASE_VERSION"
          echo "Build#   : $BUILD_NUM"
          echo "Final ver: $VERSION_NAME"

      # ── Patch pubspec.yaml with computed version ─────────────
      - name: Patch pubspec version
        run: |
          FLUTTER_VER="${{ steps.version.outputs.flutter_version }}"
          sed -i "s/^version: .*/version: $FLUTTER_VER/" pubspec.yaml
          echo "pubspec version is now: $(grep '^version:' pubspec.yaml)"

      # ── Scan for v1 embedding (safety net) ───────────────────
      - name: Scan for v1 embedding references
        run: |
          echo "=== v1 embedding scan ==="
          # flutterEmbedding value="2" is the correct v2 marker — only flag value="1"
          if grep -rE                'io\.flutter\.app\.Flutter|PluginRegistry\.Registrar|registerWith\(Registrar|flutterEmbedding.*value.*"1"'                android/; then
            echo "❌ v1 embedding references found — build will fail"
            exit 1
          else
            echo "✅ no v1 embedding references"
          fi

      # ── Build ─────────────────────────────────────────────────
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      # ── Upload artifact ───────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          # main   → SimplyNet-0.1.0.apk
          # branch → SimplyNet-0.1.0a42-debug_cidr.apk
          name: >-
            SimplyNet-${{ steps.version.outputs.version_name }}${{
              github.ref_name != 'main' &&
              format('-{0}', steps.version.outputs.safe_branch) || '' }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
